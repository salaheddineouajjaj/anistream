
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniStream Celestial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #facc15;
            --purple: #9333ea;
            --void: #020202;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--void);
            color: #f8fafc;
            overflow-x: hidden;
            perspective: 1500px;
        }
        .font-arabic { font-family: 'Cairo', sans-serif; }
        
        /* 3D Container Setup */
        .perspective-container {
            perspective: 2000px;
            transform-style: preserve-3d;
        }

        /* Celestial Glass */
        .glass {
            background: rgba(5, 5, 5, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(250, 204, 21, 0.15);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
        }

        /* Floating Animation */
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-20px) rotate(1deg); }
        }
        .floating { animation: float 6s ease-in-out infinite; }

        /* Golden Shimmer */
        .gold-shimmer {
            background: linear-gradient(90deg, transparent, rgba(250, 204, 21, 0.4), transparent);
            background-size: 200% 100%;
            animation: shimmer 4s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .gold-glow {
            filter: drop-shadow(0 0 15px rgba(250, 204, 21, 0.3));
        }

        .purple-nebula {
            background: 
                radial-gradient(circle at 20% 30%, rgba(147, 51, 234, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(147, 51, 234, 0.1) 0%, transparent 50%),
                var(--void);
        }

        .text-gold-gradient {
            background: linear-gradient(to right, #facc15, #fef08a, #eab308);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--void); }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(to bottom, var(--gold), var(--purple)); 
            border-radius: 10px;
        }

        /* 3D Motion System Utilities */
        .perspective-1000 { perspective: 1000px; }
        .perspective-2000 { perspective: 2000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .will-change-transform { will-change: transform; }
        
        /* Shine Overlay for Hologram Cards */
        .shine-overlay {
            pointer-events: none;
            mix-blend-mode: screen;
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Stagger Item Base */
        .stagger-item {
            opacity: 0;
        }

        /* Custom Scroll for Episode Lists */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
<script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.475.0",

  }
}
</script>

</head>
<body class="purple-nebula">
    <div id="root"></div>

</html>
